name: five_str
description: "5STR Business Discovery Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1

  # Local Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI Components
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_grid_view: ^0.7.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Image Handling
  image_picker: ^1.1.2

  # Icons
  ionicons: ^0.2.2

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  flutter_rating_bar: ^4.0.1
  google_sign_in: ^6.2.2
  timeago: ^3.7.0

  # Environment
  

  # Animations
  flutter_animate: ^4.5.2

  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: BentonSans
      fonts:
        - asset: "assets/fonts/BentonSans Light.otf"
          weight: 300
        - asset: "assets/fonts/BentonSans Regular.otf"
          weight: 400
        - asset: "assets/fonts/BentonSans Medium.otf"
          weight: 500
